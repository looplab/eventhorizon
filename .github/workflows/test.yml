name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .tool-versions

  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        shell: bash
        run: |
          make test_cover

      - name: Store coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit_coverage
          path: unit.coverprofile

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Services
        shell: bash
        run: |
          make run && sleep 15

      - name: Test
        shell: bash
        run: |
          make test_integration_cover

      - name: Store coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration_coverage
          path: integration.coverprofile

  finish:
    name: Finish
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Load unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit_coverage

      - name: Load integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration_coverage

      - name: Merge coverage
        shell: bash
        run: |
          head -1 unit.coverprofile > coverage.out
          tail -n +2 unit.coverprofile >> coverage.out
          tail -n +2 integration.coverprofile >> coverage.out

      - name: Convert coverage
        uses: jandelgado/gcov2lcov-action@v1.0.9
        with:
          infile: coverage.out
          outfile: coverage.lcov

      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          file: coverage.lcov
