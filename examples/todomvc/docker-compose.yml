version: "3.4"

services:
  todomvc:
    build:
      context: ../../
      dockerfile: ./examples/todomvc/Dockerfile
    depends_on:
      - mongodb-docker
      - redis
      - tracing
    ports:
      - 8080:8080
    environment:
      MONGODB_ADDR: mongodb-docker:27017
      REDIS_ADDR: redis:6379
      TRACING_URL: tracing

  mongodb-docker:
    image: mongo:8.2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - 27017:27017
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb-docker:27017'}]}).ok }"
      interval: 5s
      start_period: 10s

  mongodb:
    image: mongo:8.2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - 27017:27017
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]}).ok }"
      interval: 5s
      start_period: 10s

  redis:
    image: redis:8.0.2-alpine
    ports:
      - 6379:6379
    entrypoint: [redis-server, --appendonly yes]

  tracing:
    image: docker.io/jaegertracing/all-in-one:1.76
    ports:
      - 9411:9411
      - 16686:16686
      - 5778:5778
    environment:
      # Enable Zipkin collector compatability.
      COLLECTOR_ZIPKIN_HTTP_PORT: 9411
